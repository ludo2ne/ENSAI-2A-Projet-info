format:
  html:
    theme:
      light: cosmo
      dark: solar
    css: styles.css
    toc: true
    toc-location: left
    toc-depth: 2
  revealjs:
    theme: moon
    css: none
    slide-number: c/t
    slide-level: 3
    controls: true

from: markdown+emoji
lightbox: true